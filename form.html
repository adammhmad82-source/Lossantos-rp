<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>نموذج التقديم</title>
  <style>
    body {
      font-family: Arial;
      background: #222;
      color: white;
      text-align: center;
    }

    input, textarea, select {
      width: 80%;
      padding: 10px;
      margin: 10px;
    }

    button {
      padding: 10px 20px;
      background: blue;
      color: white;
      border: none;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <h1>نموذج التقديم</h1>

  <input placeholder="اسمك الحقيقي"><br>

  <input placeholder="اسمك في الرول بلاي"><br>

  <input type="number" placeholder="عمرك"><br>

  <select>
    <option>مستواك في الرول بلاي</option>
    <option>عادي</option>
    <option>متوسط</option>
    <option>عالي</option>
  </select><br>

  <textarea placeholder="قصتك في الرول بلاي"></textarea><br>

  <input placeholder="لينك دسكورد بتاعك"><br>

  <button onclick="alert('تم إرسال الطلب (شكل فقط)')">
    إرسال
  </button>

</body>
</html>
